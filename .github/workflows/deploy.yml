name: Build & Deploy TravelCourier

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Set up Node.js (needed for Vaadin frontend build)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # 4. Build production JAR (includes frontend compilation)
      - name: Build production JAR
        run: ./mvnw clean package -Pproduction -DskipTests

      # 5. Upload the JAR as an artifact (so you can download it)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-courier-app
          path: target/*.jar
          retention-days: 30

      # 6. Deploy to Railway (only on push to main)
      - name: Deploy to Railway
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE }}
